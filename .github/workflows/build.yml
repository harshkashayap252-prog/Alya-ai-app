name: Flutter APK Build

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.x'

      - name: Create Full Flutter Project Structure
        run: |
          cd ..
          flutter create --org com.harsh.alya alya_temp --platforms android
          cp -r $GITHUB_WORKSPACE/pubspec.yaml alya_temp/pubspec.yaml
          cp -r $GITHUB_WORKSPACE/lib/main.dart alya_temp/lib/main.dart
          mv alya_temp/* $GITHUB_WORKSPACE/
          mv alya_temp/.[!.]* $GITHUB_WORKSPACE/ 2>/dev/null || true

      - name: Install Dependencies
        run: flutter pub get

      - name: Build APK (Release Mode)
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
